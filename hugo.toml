baseURL = 'https://vamsikiran277.github.io/'
languageCode = 'en-us'
title = 'Vamsi Kiran | Firmware Engineer'
theme = 'PaperMod'

[outputs]
    home = ["HTML", "RSS", "JSON"]

# --- START OF PARAMS (Only one [params] allowed!) ---
[params]
    env = "production"
    title = "Vamsi Kiran"
    description = "Firmware Engineer Portfolio"
    author = "Vamsi Kiran"
    
    # Theme Logic
    defaultTheme = "dark"
    disableThemeToggle = true 
    
    # UI Features
    ShowReadingTime = true
    ShowShareButtons = false
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    
    # Asset Management (Fixed from your second [params] block)
    assets = { disableFingerprinting = false }

    # Branding
    label = { text = "Home" }

    [params.profileMode]
        enabled = true
        title = "Vamsi Kiran"
        subtitle = "Firmware Engineer & Embedded Systems Architect. Building low-latency IoT infrastructure and bare-metal systems."
    #    imageUrl = "/images/profile.png"
    #    imageWidth = 120
    #    imageHeight = 120

        [[params.profileMode.buttons]]
            name = "View Projects"
            url = "/projects/"

        [[params.profileMode.buttons]]
            name = "View GitHub"
            url = "https://github.com/VamsiKiran277"

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/VamsiKiran277"

    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/in/vamsi-kiran-mekala-57135424a/"

# --- END OF PARAMS ---

[[menu.main]]
    name = "Resume"
    url = "resume"
    weight = 5

[[menu.main]]
    name = "Projects"
    url = "projects"
    weight = 10

[[menu.main]]
    name = "Search"
    url = "search"
    weight = 20

[[menu.main]]
    name = "Tags"
    url = "tags"
    weight = 30